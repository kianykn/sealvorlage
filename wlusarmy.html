<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weapon Logistic Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#050505;
      color:white;
      min-height:100vh;
    }

    /* STARTSEITE */
    .start-page{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
      gap:30px;
    }

    .title{
      font-size:48px;
      font-weight:bold;
      color:#ff2a2a;
      text-shadow:0 0 25px rgba(255,0,0,0.4);
    }

    .menu{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu button{
      padding:16px 28px;
      border:none;
      border-radius:12px;
      background:#111;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
      min-width:220px;
      border:1px solid #222;
    }

    .menu button:hover{
      background:#ff2a2a;
      transform:translateY(-3px);
      box-shadow:0 0 20px rgba(255,0,0,0.4);
    }

    .disabled{
      opacity:0.4;
      cursor:not-allowed !important;
    }

    /* DASHBOARD */
    .dashboard{
      display:none;
      height:100vh;
      padding:20px;
      gap:20px;
    }

    .left, .right{
      background:#0b0b0b;
      border-radius:16px;
      padding:20px;
      overflow-y:auto;
      border:1px solid #1a1a1a;
    }

    .left{ width:66%; }
    .right{ width:34%; }

    .dashboard h2{
      margin-bottom:20px;
      color:#ff2a2a;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      gap:10px;
    }

    .search{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
      font-size:16px;
      border:1px solid #222;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:14px;
      text-align:left;
      border-bottom:1px solid #1a1a1a;
    }

    th{
      color:#ff2a2a;
      background:#0a0a0a;
      position:sticky;
      top:0;
    }

    input[type="number"]{
      width:80px;
      padding:8px;
      border:none;
      border-radius:8px;
      background:#111;
      color:white;
      border:1px solid #222;
    }

    .summary-box{
      background:#0a0a0a;
      padding:16px;
      border-radius:12px;
      margin-top:20px;
      border:1px solid #1a1a1a;
    }

    .summary-box h3{
      margin-bottom:10px;
      color:#ff2a2a;
    }

    .back-btn, .reset-btn{
      padding:10px 16px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .back-btn{
      background:#ff2a2a;
      color:black;
      margin-bottom:10px;
    }

    .reset-btn{
      background:#222;
      color:white;
      margin-left:10px;
      border:1px solid #333;
    }

    .reset-btn:hover{
      background:#ff2a2a;
      color:black;
    }

    .empty{
      opacity:0.6;
      margin-top:10px;
    }

    @media(max-width:1100px){
      .dashboard{
        flex-direction:column;
      }

      .left, .right{
        width:100%;
      }
    }
  </style>
</head>

<body>

<!-- START -->
<div class="start-page" id="startPage">
  <div class="title">Weapon Logistic Dashboard</div>

  <div class="menu">
    <button onclick="openDashboard()">Produktionsrechner</button>
    <button class="disabled">Lagerverwaltung</button>
    <button class="disabled">Mitarbeiter</button>
    <button class="disabled">Statistiken</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="left">

    <button class="back-btn" onclick="goBack()">← Zurück</button>
    <button class="reset-btn" onclick="resetAll()">Reset</button>

    <div class="topbar">
      <h2>Produktliste</h2>
      <input type="text" id="search" class="search"
        placeholder="Produkt suchen..." onkeyup="renderProducts()"/>
    </div>

    <table>
      <thead>
        <tr>
          <th>Produkt</th>
          <th>Produktionszeit</th>
          <th>Rohstoffe</th>
          <th>Anzahl</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>

  </div>

  <div class="right">
    <h2>Ausgewählte Produkte</h2>

    <table>
      <thead>
        <tr>
          <th>Produkt</th>
          <th>Menge</th>
          <th>Zeit</th>
        </tr>
      </thead>
      <tbody id="selectedTable"></tbody>
    </table>

    <div class="summary-box">
      <h3>Benötigte Rohstoffe</h3>
      <div id="materials"></div>
    </div>

    <div class="summary-box">
      <h3>Gesamtzeit</h3>
      <div id="totalTime"></div>
    </div>

  </div>
</div>

<script>
const products = [
  {name:"Magazin", time:3, materials:{Kupfer:1}},
  {name:"Tazer", time:70, materials:{Eisen:5}},
  {name:"Schutzweste", time:10, materials:{Fasern:5}},
  {name:"Erweitertes Magazin", time:15, materials:{Kupfer:8}},
  {name:"PDW", time:125, materials:{Eisen:15}},
  {name:"Taschenlampe", time:15, materials:{Kupfer:5}},
  {name:"SMG", time:125, materials:{Eisen:20, Platin:20}},
  {name:"Schalldämpfer", time:100, materials:{Kupfer:5}},
  {name:"Griff", time:15, materials:{Eisen:15}},
  {name:"Zielfernrohr", time:15, materials:{Kupfer:15}},
  {name:"Sniper", time:1800, materials:{Kupfer:40, Eisen:40}},
  {name:"Pumpgun", time:150, materials:{Kupfer:15, Eisen:15}},
  {name:"Messer", time:60, materials:{Kupfer:5, Eisen:3}},
  {name:"Fallschirm", time:95, materials:{Fasern:10}},
  {name:"Spezialkarabiner Mk2", time:120, materials:{Eisen:20, Platin:20}},
  {name:"Kampfpistole", time:95, materials:{Eisen:20, Platin:10}},
  {name:"Kampf SMG", time:125, materials:{Eisen:20, Platin:20}},
  {name:"Revolver", time:60, materials:{Eisen:20, Platin:30}},
  {name:"Beanbag", time:125, materials:{Eisen:40, Platin:40}},
  {name:"Leuchtpistole", time:5, materials:{Eisen:20, Platin:20}},
  {name:"Schlagstock", time:5, materials:{Kupfer:5}},
  {name:"Schaufel", time:125, materials:{Kupfer:5}},
  {name:"Dienstgewehr", time:1800, materials:{Eisen:20, Platin:20}},
  {name:"Taschenlampe Aufsatz", time:15, materials:{}},
  {name:"Sniper Magazin", time:5, materials:{Kupfer:2}}
];

let selected = {};

function openDashboard(){
  document.getElementById("startPage").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  renderProducts();
}

function goBack(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("startPage").style.display="flex";
}

function resetAll(){
  selected = {};
  document.querySelectorAll("input[type='number']").forEach(i => i.value = 0);
  renderSummary();
  renderProducts();
}

function formatTime(seconds){
  let h = Math.floor(seconds/3600);
  let m = Math.floor((seconds%3600)/60);
  let s = seconds%60;
  let parts=[];
  if(h>0)parts.push(h+"h");
  if(m>0)parts.push(m+"m");
  if(s>0||parts.length===0)parts.push(s+"s");
  return parts.join(" ");
}

function renderProducts(){
  const table=document.getElementById("productTable");
  const search=document.getElementById("search").value.toLowerCase();
  table.innerHTML="";

  products
  .filter(p=>p.name.toLowerCase().includes(search))
  .forEach(product=>{
    const row=document.createElement("tr");

    const materialText=Object.entries(product.materials)
    .map(([n,a])=>`${a}x ${n}`).join(" + ")||"-";

    row.innerHTML=`
      <td>${product.name}</td>
      <td>${formatTime(product.time)}</td>
      <td>${materialText}</td>
      <td>
        <input type="number" min="0"
        value="${selected[product.name]||0}"
        onchange="updateSelection('${product.name}',this.value)">
      </td>
    `;
    table.appendChild(row);
  });
}

function updateSelection(name,value){
  value=parseInt(value);
  if(value<=0||isNaN(value)) delete selected[name];
  else selected[name]=value;
  renderSummary();
}

function renderSummary(){
  const selectedTable=document.getElementById("selectedTable");
  const materialsDiv=document.getElementById("materials");
  const totalTimeDiv=document.getElementById("totalTime");

  selectedTable.innerHTML="";
  let totalMaterials={};
  let longest=0;

  const entries=Object.entries(selected);

  if(entries.length===0){
    selectedTable.innerHTML=`<tr><td colspan="3" class="empty">Keine Produkte ausgewählt</td></tr>`;
    materialsDiv.innerHTML="Keine Rohstoffe benötigt";
    totalTimeDiv.innerHTML="0s";
    return;
  }

  entries.forEach(([name,amount])=>{
    const product=products.find(p=>p.name===name);
    const time=product.time*amount;
    if(time>longest) longest=time;

    selectedTable.innerHTML+=`
      <tr>
        <td>${name}</td>
        <td>${amount}</td>
        <td>${formatTime(time)}</td>
      </tr>
    `;

    Object.entries(product.materials).forEach(([m,q])=>{
      totalMaterials[m]=(totalMaterials[m]||0)+q*amount;
    });
  });

  materialsDiv.innerHTML=Object.entries(totalMaterials)
  .map(([m,q])=>`<div>${q}x ${m}</div>`).join("");

  totalTimeDiv.innerHTML=formatTime(longest);
}

renderSummary();
</script>

</body>
</html>
