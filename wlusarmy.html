<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weapon Logistic Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#000;
  color:white;
}

/* START */
.start-page{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:30px;
}

.title{
  font-size:48px;
  color:#ff0000;
  text-shadow:0 0 20px #ff000055;
}

.menu button{
  padding:16px 28px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
  min-width:220px;
}

.menu button:hover{
  background:#ff0000;
}

/* DASHBOARD */
.dashboard{
  display:none;
  height:100vh;
  padding:20px;
  gap:20px;
}

.left,.right{
  background:#111;
  border-radius:16px;
  padding:20px;
  overflow-y:auto;
}

.left{width:66%}
.right{width:34%}

h2{
  color:#ff0000;
}

.search{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid #ff0000;
  color:white;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #222;
}

th{
  color:#ff0000;
}

input{
  width:70px;
  background:#000;
  border:1px solid #ff0000;
  color:white;
  padding:6px;
  border-radius:6px;
}

.summary-box{
  margin-top:20px;
  padding:12px;
  background:#000;
  border:1px solid #ff0000;
  border-radius:12px;
}

button{
  cursor:pointer;
}

.back-btn,.reset-btn{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

.back-btn{
  background:#ff0000;
  color:white;
}

.reset-btn{
  background:#222;
  color:white;
  margin-left:10px;
}

.reset-btn:hover{
  background:#ff0000;
}

</style>
</head>

<body>

<div class="start-page" id="startPage">
  <div class="title">Weapon Logistic Dashboard</div>

  <div class="menu">
    <button onclick="openDashboard()">Produktionsrechner</button>
  </div>
</div>

<div class="dashboard" id="dashboard">

<div class="left">
  <button class="back-btn" onclick="goBack()">← Zurück</button>
  <button class="reset-btn" onclick="resetAll()">Reset</button>

  <h2>Produkte</h2>

  <input class="search" id="search" placeholder="Suche..." onkeyup="renderProducts()">

  <table>
    <thead>
      <tr>
        <th>Produkt</th>
        <th>Zeit</th>
        <th>Rohstoffe</th>
        <th>Menge</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

<div class="right">
  <h2>Auswahl</h2>

  <table>
    <thead>
      <tr>
        <th>Produkt</th>
        <th>Menge</th>
        <th>Zeit</th>
      </tr>
    </thead>
    <tbody id="selectedTable"></tbody>
  </table>

  <div class="summary-box">
    <h3>Rohstoffe</h3>
    <div id="materials"></div>
  </div>

  <div class="summary-box">
    <h3>Zeit</h3>
    <div id="totalTime"></div>
  </div>
</div>

</div>

<script>
const products = [
{name:"Magazin", time:3, materials:{Kupfer:1}},
{name:"Tazer", time:70, materials:{Eisen:5}},
{name:"Schutzweste", time:10, materials:{Fasern:5}},
{name:"Erweitertes Magazin", time:15, materials:{Kupfer:8}},
{name:"PDW", time:125, materials:{Eisen:15}},
{name:"SMG", time:125, materials:{Eisen:20, Platin:20}},
{name:"Sniper", time:1800, materials:{Kupfer:40, Eisen:40}}
];

let selected = {};

function openDashboard(){
document.getElementById("startPage").style.display="none";
document.getElementById("dashboard").style.display="flex";
renderProducts();
renderSummary();
}

function goBack(){
document.getElementById("dashboard").style.display="none";
document.getElementById("startPage").style.display="flex";
}

function resetAll(){
selected = {};
document.querySelectorAll("input").forEach(i=>i.value=0);
renderSummary();
renderProducts();
}

function formatTime(s){
let m=Math.floor(s/60);
let sec=s%60;
return (m?m+"m ":"")+sec+"s";
}

function renderProducts(){
const search=document.getElementById("search").value.toLowerCase();
const table=document.getElementById("productTable");
table.innerHTML="";

products.filter(p=>p.name.toLowerCase().includes(search)).forEach(p=>{
let mat=Object.entries(p.materials).map(x=>x[1]+"x "+x[0]).join(" + ");

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${formatTime(p.time)}</td>
<td>${mat}</td>
<td><input type="number" min="0" value="${selected[p.name]||0}" onchange="set('${p.name}',this.value)"></td>
</tr>`;
});
}

function set(name,val){
val=parseInt(val);
if(!val||val<=0) delete selected[name];
else selected[name]=val;
renderSummary();
}

function renderSummary(){
let sel=document.getElementById("selectedTable");
let matDiv=document.getElementById("materials");
let timeDiv=document.getElementById("totalTime");

sel.innerHTML="";
let mats={};
let max=0;

for(let n in selected){
let p=products.find(x=>x.name==n);
let t=p.time*selected[n];
if(t>max) max=t;

sel.innerHTML+=`<tr><td>${n}</td><td>${selected[n]}</td><td>${formatTime(t)}</td></tr>`;

for(let m in p.materials){
mats[m]=(mats[m]||0)+p.materials[m]*selected[n];
}
}

matDiv.innerHTML=Object.entries(mats).map(x=>x[1]+"x "+x[0]).join("<br>")||"Keine";
timeDiv.innerHTML=formatTime(max)||"0s";
}
</script>

</body>
</html>
