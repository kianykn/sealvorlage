<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familien Outfit</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- Cropper -->
<link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.min.css">
<script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background-color: #0f1013;
    color: white;
    padding: 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

/* FIX 1: abgeschnittene Schrift */
body {
    line-height: 1.4;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    border-radius: 1.5rem;
    border: 1px solid #3f3f46;
    background-color: #17181d;
    padding: 1.5rem;
}

/* HEADER */
.header {
    margin-bottom: 1.5rem;
    border-bottom: 1px solid #3f3f46;
    padding-bottom: 1rem;
    display: flex;
    justify-content: space-between;
}

.header h1 {
    font-size: 2.25rem;
    font-weight: 700;
}

/* INPUTS */
.header-input,
.text-input,
.textarea-input {
    width: 100%;
    background: rgba(39, 39, 42, 0.8);
    border: 1px solid #52525b;
    color: white;
    border-radius: 0.6rem;
    padding: 0.6rem 0.8rem;
}

/* BUTTONS */
.generate-wrapper {
    display: flex;
    justify-content: flex-end;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.generate-btn {
    background: white;
    color: black;
    padding: 0.9rem 1.4rem;
    border-radius: 0.8rem;
    font-weight: 700;
    cursor: pointer;
}

/* GRID */
.looks-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
}

/* UPLOAD BOX */
.upload-box {
    position: relative;
    border-radius: 1rem;
    border: 1px solid #3f3f46;
    background-color: rgba(39,39,42,0.7);
    height: 20rem;
    overflow: hidden;
}

/* + FIX (Punkt 1 Problem) */
.upload-box .plus {
    font-size: 3rem;
    font-weight: 700;
}

/* IMAGE */
.upload-box img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}

.upload-box img.visible {
    display: block;
}

/* PLACEHOLDER */
.placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    color: #d4d4d8;
}

/* FIX EXPORT TEXT ONLY */
.export-mode input,
.export-mode textarea {
    display: none !important;
}

/* CROPPER FIX */
#cropModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

#cropModal > div {
    background: #111;
    padding: 1rem;
    border-radius: 10px;
    max-width: 90%;
}

#cropImage {
    max-width: 500px;
}
</style>
</head>

<body>

<!-- FIX 4: RESET BUTTON -->
<div class="generate-wrapper">
    <button class="generate-btn" onclick="resetAll()">RESET</button>
    <button class="generate-btn" onclick="generatePNG()">PNG GENERIEREN</button>
</div>

<div class="container" id="capture">

<!-- FIX 6: Subtitle weg -->
<div class="header">
    <h1>FAMILIEN OUTFIT</h1>

    <div>
        <input id="familyName" class="header-input" placeholder="Familienname">
        <input class="header-input" placeholder="Farbschema">
    </div>
</div>

<div class="looks-grid">

    <label class="upload-box">
        <input type="file" accept="image/*" onchange="handleUpload(this)">
        <img>
        <div class="placeholder"><div class="plus">+</div>LOOK 1</div>
    </label>

    <label class="upload-box">
        <input type="file" accept="image/*" onchange="handleUpload(this)">
        <img>
        <div class="placeholder"><div class="plus">+</div>LOOK 2</div>
    </label>

    <label class="upload-box">
        <input type="file" accept="image/*" onchange="handleUpload(this)">
        <img>
        <div class="placeholder"><div class="plus">+</div>LOOK 3</div>
    </label>

</div>

</div>

<!-- CROPPER MODAL -->
<div id="cropModal">
    <div>
        <img id="cropImage">
        <br><br>
        <button onclick="applyCrop()">Übernehmen</button>
        <button onclick="closeCrop()">Abbrechen</button>
    </div>
</div>

<script>

let cropper;
let currentInput;

/* FIX 2 + + ICON bleibt erhalten + Crop Button */
function handleUpload(input) {

    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {

        currentInput = input;

        const modal = document.getElementById('cropModal');
        const img = document.getElementById('cropImage');

        img.src = e.target.result;
        modal.style.display = 'flex';

        if (cropper) cropper.destroy();

        cropper = new Cropper(img, {
            viewMode: 1,
            autoCropArea: 1
        });
    };

    reader.readAsDataURL(file);
}

function applyCrop() {

    const canvas = cropper.getCroppedCanvas();

    const img = currentInput.parentElement.querySelector('img');

    img.src = canvas.toDataURL('image/png');
    img.classList.add('visible');

    closeCrop();
}

function closeCrop() {
    document.getElementById('cropModal').style.display = 'none';
    if (cropper) cropper.destroy();
}

/* FIX 4 RESET */
function resetAll() {
    document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    document.querySelectorAll('img').forEach(img => {
        img.src = '';
        img.classList.remove('visible');
    });
}

/* FIX 3 + 5 PNG EXPORT */
async function generatePNG() {

    const el = document.getElementById('capture');

    el.classList.add('export-mode');

    const canvas = await html2canvas(el, {
        backgroundColor: '#0f1013',
        scale: 2,
        useCORS: true
    });

    el.classList.remove('export-mode');

    const out = document.createElement('canvas');
    out.width = 1920;
    out.height = 1080;

    const ctx = out.getContext('2d');

    ctx.fillStyle = '#0f1013';
    ctx.fillRect(0,0,1920,1080);
    ctx.drawImage(canvas,0,0,1920,1080);

    const name = document.getElementById('familyName').value || 'familie';

    const a = document.createElement('a');
    a.download = name + '.png';
    a.href = out.toDataURL('image/png');
    a.click();
}

</script>

</body>
</html>
