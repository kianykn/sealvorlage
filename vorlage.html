<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familien Outfit</title>

    <!-- HTML2CANVAS -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #0f1013;
            color: white;
            padding: 1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        .action-wrapper {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            border: none;
            padding: 0.9rem 1.4rem;
            border-radius: 0.8rem;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .generate-btn {
            background: white;
            color: black;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            background: #e4e4e7;
        }

        .reset-btn {
            background: #ef4444;
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            background: #dc2626;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            border-radius: 1.5rem;
            border: 1px solid #3f3f46;
            background-color: #17181d;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #3f3f46;
            padding-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }

        .header-fields {
            display: flex;
            gap: 2rem;
            font-size: 0.875rem;
            color: #d4d4d8;
        }

        .header-field label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: block;
        }

        /* Input & Textarea Styling */
        .header-input,
        .text-input,
        .textarea-input {
            width: 100%;
            background: rgba(39, 39, 42, 0.8);
            border: 1px solid #52525b;
            color: white;
            border-radius: 0.6rem;
            padding: 0.6rem 0.8rem;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        .header-input {
            width: 10rem;
        }

        .textarea-input {
            resize: vertical;
            min-height: 70px;
        }

        /* Temp-Klassen für den sauberen PNG-Export */
        .png-text-render {
            display: block;
            width: 100%;
            color: white;
            font-size: 0.9rem;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            padding: 0.2rem 0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 3fr 1fr;
            }
        }

        .looks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .looks-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Upload & Crop Container */
        .upload-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.7);
            cursor: pointer;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .upload-box:hover {
            background-color: rgba(63, 63, 70, 0.6);
        }

        .upload-box.h-80 { height: 20rem; }
        .upload-box.h-52 { height: 13rem; }

        .upload-box input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
        }

        /* Container für das zugeschnittene Bild */
        .cropped-preview-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        .cropped-preview-container.visible {
            display: block;
        }

        .cropped-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-box .placeholder {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            color: #d4d4d8;
        }

        .upload-box .placeholder .plus {
            font-size: 3rem;
            font-weight: 700;
        }

        .upload-box .placeholder .label {
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 0 0.5rem;
        }

        .bottom-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 768px) {
            .bottom-section {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.4);
            padding: 1.25rem;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f4f4f5;
            line-height: 1.2;
        }

        .allgemeines-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .detail-section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #f4f4f5;
            line-height: 1.2;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
        }

        .merkmale-card {
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.4);
            padding: 1.25rem;
        }

        .merkmale-card h2 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .merkmale-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .merkmal-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .merkmal-avatar {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #52525b;
            flex-shrink: 0;
            background-color: #3f3f46;
            position: relative;
            cursor: pointer;
        }

        .merkmal-avatar input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
        }

        .merkmal-avatar .plus {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #d4d4d8;
            font-weight: 700;
            z-index: 10;
        }

        .merkmal-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* --- CROP MODAL POPUP --- */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-backdrop.active {
            display: flex;
        }
        .modal-content {
            background: #17181d;
            border: 1px solid #3f3f46;
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .crop-viewport {
            width: 100%;
            height: 320px;
            background: #0f1013;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
            cursor: move;
            user-select: none;
        }
        .crop-viewport img {
            position: absolute;
            transform-origin: top left;
            will-change: transform;
        }
        /* Maskierungs-Rahmen zur Orientierung */
        .crop-overlay {
            position: absolute;
            inset: 0;
            border: 2px dashed #ffffff;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }
        .modal-controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .modal-controls label {
            font-size: 0.85rem;
            color: #a1a1aa;
        }
        .modal-controls input[type="range"] {
            width: 100%;
            accent-color: #white;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="action-wrapper">
        <button class="btn reset-btn" onclick="resetForm()">
            ZURÜCKSETZEN
        </button>
        <button class="btn generate-btn" onclick="generatePNG()">
            PNG GENERIEREN
        </button>
    </div>

    <div class="container" id="capture">

        <div class="header">
            <div>
                <h1>FAMILIEN OUTFIT</h1>
            </div>

            <div class="header-fields">
                <div class="header-field">
                    <label>Familienname</label>
                    <input class="header-input" type="text" id="familyNameInput">
                </div>

                <div class="header-field">
                    <label>Farbschema</label>
                    <input class="header-input" type="text">
                </div>
            </div>
        </div>

        <div class="main-grid">

            <div>
                <div class="looks-grid">
                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                        <div class="cropped-preview-container"><img></div>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 1</div>
                        </div>
                    </label>

                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                        <div class="cropped-preview-container"><img></div>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 2</div>
                        </div>
                    </label>

                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                        <div class="cropped-preview-container"><img></div>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 3</div>
                        </div>
                    </label>
                </div>

                <div class="bottom-section">
                    <div class="card">
                        <h2>ALLGEMEINES</h2>
                        <div class="allgemeines-list">
                            <input class="text-input" type="text" placeholder="Pflichtteile definieren">
                            <input class="text-input" type="text" placeholder="Farbschema festlegen">
                            <input class="text-input" type="text" placeholder="Freie Kleidungswahl">
                            <textarea class="textarea-input" placeholder="Besondere Regeln"></textarea>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h2>DETAILBILDER</h2>
                        <div class="details-grid">
                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                                <div class="cropped-preview-container"><img></div>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 1</div>
                                </div>
                            </label>

                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                                <div class="cropped-preview-container"><img></div>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 2</div>
                                </div>
                            </label>

                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="initCropper(this, 'rect')">
                                <div class="cropped-preview-container"><img></div>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 3</div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="merkmale-card">
                <h2>MERKMALE</h2>
                <div class="merkmale-list">

                    <div class="merkmal-item">
                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="initCropper(this, 'circle')">
                            <div class="cropped-preview-container"><img></div>
                            <div class="plus">+</div>
                        </div>
                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="Merkmal">
                            <textarea class="textarea-input" placeholder="Beschreibung"></textarea>
                        </div>
                    </div>

                    <div class="merkmal-item">
                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="initCropper(this, 'circle')">
                            <div class="cropped-preview-container"><img></div>
                            <div class="plus">+</div>
                        </div>
                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="Merkmal">
                            <textarea class="textarea-input" placeholder="Beschreibung"></textarea>
                        </div>
                    </div>

                    <div class="merkmal-item">
                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="initCropper(this, 'circle')">
                            <div class="cropped-preview-container"><img></div>
                            <div class="plus">+</div>
                        </div>
                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="Merkmal">
                            <textarea class="textarea-input" placeholder="Beschreibung"></textarea>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- CROP MODAL -->
    <div class="modal-backdrop" id="cropModal">
        <div class="modal-content">
            <h3>Bild zuschneiden</h3>
            <div class="crop-viewport" id="cropViewport">
                <img id="modalImg" src="" alt="">
                <div class="crop-overlay" id="cropOverlay"></div>
            </div>
            <div class="modal-controls">
                <label for="zoomSlider">Zoom</label>
                <input type="range" id="zoomSlider" min="1" max="4" step="0.01" value="1">
            </div>
            <div class="modal-buttons">
                <button class="btn" style="background: #3f3f46; color: white;" onclick="closeModal()">Abbrechen</button>
                <button class="btn" style="background: white; color: black;" onclick="applyCrop()">Ausschnitt wählen</button>
            </div>
        </div>
    </div>

    <script>
        // Cropper Zustandsvariablen
        let currentTargetInput = null;
        let cropType = 'rect'; // 'rect' oder 'circle'
        let imgElement = document.getElementById('modalImg');
        let viewport = document.getElementById('cropViewport');
        let zoomSlider = document.getElementById('zoomSlider');
        let overlay = document.getElementById('cropOverlay');

        let zoom = 1;
        let posX = 0, posY = 0;
        let isDragging = false;
        let startX, startY;
        let imgWidth, imgHeight;

        // Initiiert das Zuschneiden beim Datei-Upload
        function initCropper(input, type) {
            const file = input.files?.[0];
            if (!file) return;

            currentTargetInput = input;
            cropType = type;

            const reader = new FileReader();
            reader.onload = function(e) {
                imgElement.src = e.target.result;
                document.getElementById('cropModal').classList.add('active');
                
                // Form des Overlays anpassen basierend auf dem Feldtyp (eckig oder rund)
                if(type === 'circle') {
                    overlay.style.borderRadius = '50%';
                } else {
                    overlay.style.borderRadius = '1rem';
                }

                imgElement.onload = function() {
                    // Standardzoom & zentrierte Positionierung berechnen
                    const viewRatio = viewport.clientWidth / viewport.clientHeight;
                    const imgRatio = imgElement.naturalWidth / imgElement.naturalHeight;

                    if (imgRatio > viewRatio) {
                        imgElement.style.height = viewport.clientHeight + 'px';
                        imgElement.style.width = 'auto';
                    } else {
                        imgElement.style.width = viewport.clientWidth + 'px';
                        imgElement.style.height = 'auto';
                    }

                    imgWidth = imgElement.clientWidth;
                    imgHeight = imgElement.clientHeight;

                    zoom = 1;
                    zoomSlider.value = 1;
                    posX = (viewport.clientWidth - imgWidth) / 2;
                    posY = (viewport.clientHeight - imgHeight) / 2;
                    updateImgTransform();
                };
            };
            reader.readAsDataURL(file);
        }

        function updateImgTransform() {
            imgElement.style.transform = `translate(${posX}px, ${posY}px) scale(${zoom})`;
        }

        // Zoom Slider Event
        zoomSlider.addEventListener('input', (e) => {
            const oldZoom = zoom;
            zoom = parseFloat(e.target.value);
            
            // Zoom auf die Mitte des Viewports anwenden
            const viewCenterX = viewport.clientWidth / 2;
            const viewCenterY = viewport.clientHeight / 2;
            posX = viewCenterX - (viewCenterX - posX) * (zoom / oldZoom);
            posY = viewCenterY - (viewCenterY - posY) * (zoom / oldZoom);
            
            updateImgTransform();
        });

        // Drag & Drop Steuerung im Viewport
        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateImgTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function closeModal() {
            document.getElementById('cropModal').classList.remove('active');
            if (currentTargetInput) currentTargetInput.value = ''; // Reset Input
        }

        // Zeichnet den gewählten Ausschnitt auf ein unsichtbares Canvas und speichert es
        function applyCrop() {
            const canvas = document.createElement('canvas');
            const targetWidth = currentTargetInput.parentElement.clientWidth;
            const targetHeight = currentTargetInput.parentElement.clientHeight;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext('2d');

            // Skalierungs- und Positionsberechnungen für das finale Canvas-Drawing
            const rect = imgElement.getBoundingClientRect();
            const viewRect = viewport.getBoundingClientRect();

            const drawX = (rect.left - viewRect.left) * (targetWidth / viewRect.width);
            const drawY = (rect.top - viewRect.top) * (targetHeight / viewRect.height);
            const drawW = rect.width * (targetWidth / viewRect.width);
            const drawH = rect.height * (targetHeight / viewRect.height);

            if(cropType === 'circle') {
                ctx.beginPath();
                ctx.arc(targetWidth / 2, targetHeight / 2, targetWidth / 2, 0, Math.PI * 2);
                ctx.clip();
            }

            ctx.drawImage(imgElement, drawX, drawY, drawW, drawH);

            // Setzt das generierte Bild in die Vorschau der Oberfläche ein
            const previewContainer = currentTargetInput.parentElement.querySelector('.cropped-preview-container');
            const previewImg = previewContainer.querySelector('img');
            
            previewImg.src = canvas.toDataURL('image/png');
            previewContainer.classList.add('visible');

            // Versteckt das Plus-Icon / Platzhalter, falls vorhanden
            const placeholder = currentTargetInput.parentElement.querySelector('.placeholder');
            if(placeholder) placeholder.style.opacity = '0';
            const plus = currentTargetInput.parentElement.querySelector('.plus');
            if(plus && cropType === 'circle') plus.style.opacity = '0';

            document.getElementById('cropModal').classList.remove('active');
        }

        // Zurücksetzen der gesamten App
        function resetForm() {
            // Alle Inputs und Textareas leeren
            document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');
            
            // Alle Bildvorschauen entfernen
            document.querySelectorAll('.cropped-preview-container').forEach(container => {
                container.classList.remove('visible');
                container.querySelector('img').src = '';
            });

            // Platzhalter wieder sichtbar machen
            document.querySelectorAll('.placeholder, .merkmal-avatar .plus').forEach(el => {
                el.style.opacity = '1';
            });

            // File-Inputs zurücksetzen
            document.querySelectorAll('input[type="file"]').forEach(input => input.value = '');
        }

        // PNG Generierung
        async function generatePNG() {
            const element = document.getElementById('capture');
            
            // Arrays zur Wiederherstellung der Formularelemente
            const elementsToRestore = [];
            const inputs = element.querySelectorAll('input[type="text"], textarea');

            // Alle Texteingaben temporär durch reine Textebenen (Spans) ersetzen
            inputs.forEach(input => {
                const parent = input.parentNode;
                const span = document.createElement('span');
                
                // Kopiert den Textinhalt oder nutzt den Platzhalter, falls leer
                span.textContent = input.value || '';
                span.className = 'png-text-render';
                
                // Behält das grundlegende Styling bei, entfernt aber Rahmen & Boxen
                if (input.classList.contains('header-input')) {
                    span.style.fontWeight = 'bold';
                }

                parent.insertBefore(span, input);
                input.style.display = 'none';

                elementsToRestore.push({ input, span });
            });

            // Rendern via html2canvas
            const canvas = await html2canvas(element, {
                backgroundColor: '#0f1013',
                scale: 2,
                useCORS: true,
                logging: false
            });

            // Formularfelder sofort wieder in den Urzustand versetzen
            elementsToRestore.forEach(({ input, span }) => {
                span.remove();
                input.style.display = 'block';
            });

            // Finales 1920x1080 Canvas erstellen
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 1920;
            finalCanvas.height = 1080;
            const ctx = finalCanvas.getContext('2d');

            ctx.fillStyle = '#0f1013';
            ctx.fillRect(0, 0, 1920, 1080);

            // Bildinhalt proportional auf die Full-HD Fläche anpassen
            const scale = Math.min(1920 / canvas.width, 1080 / canvas.height);
            const x = (1920 - canvas.width * scale) / 2;
            const y = (1080 - canvas.height * scale) / 2;
            ctx.drawImage(canvas, x, y, canvas.width * scale, canvas.height * scale);

            // Dateinamen bestimmen (Dynamisch nach dem Familiennamen-Input)
            const familyName = document.getElementById('familyNameInput').value.trim();
            const filename = familyName ? `${familyName}.png` : 'familien-outfit.png';

            // Download anstoßen
            const link = document.createElement('a');
            link.download = filename;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
        }
    </script>

</body>
</html>
