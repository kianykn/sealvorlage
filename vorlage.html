<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familien Outfit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background-color: #0f1013;
            color: white;
            padding: 1.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            border-radius: 1.5rem;
            border: 1px solid #3f3f46;
            background-color: #17181d;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .header {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #3f3f46;
            padding-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .header p {
            color: #a1a1aa;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .header-fields {
            display: flex;
            gap: 2rem;
            font-size: 0.875rem;
            color: #d4d4d8;
        }
        .header-field label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: block;
        }

        /* INPUTS */
        .header-input,
        .text-input,
        .textarea-input {
            width: 100%;
            background: rgba(39, 39, 42, 0.8);
            border: 1px solid #52525b;
            color: white;
            border-radius: 0.6rem;
            padding: 0.6rem 0.8rem;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        .header-input:focus,
        .text-input:focus,
        .textarea-input:focus {
            border-color: #71717a;
        }

        .header-input {
            width: 10rem;
        }

        .textarea-input {
            resize: vertical;
            min-height: 70px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 3fr 1fr;
            }
        }

        .looks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .looks-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .upload-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.7);
            cursor: pointer;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .upload-box:hover {
            background-color: rgba(63, 63, 70, 0.6);
        }

        .upload-box.h-80 {
            height: 20rem;
        }

        .upload-box.h-52 {
            height: 13rem;
        }

        .upload-box input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
        }

        .upload-box img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .upload-box img.visible {
            display: block;
        }

        .upload-box .placeholder {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            color: #d4d4d8;
        }

        .upload-box .placeholder .plus {
            font-size: 3rem;
            font-weight: 700;
        }

        .upload-box .placeholder .label {
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 0 0.5rem;
        }

        .bottom-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 768px) {
            .bottom-section {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.4);
            padding: 1.25rem;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f4f4f5;
        }

        .allgemeines-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .detail-section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #f4f4f5;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .details-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .merkmale-card {
            border-radius: 1rem;
            border: 1px solid #3f3f46;
            background-color: rgba(39, 39, 42, 0.4);
            padding: 1.25rem;
        }

        .merkmale-card h2 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .merkmale-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .merkmal-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .merkmal-avatar {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #52525b;
            flex-shrink: 0;
            background-color: #3f3f46;
            position: relative;
        }

        .merkmal-avatar input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
        }

        .merkmal-avatar img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .merkmal-avatar img.visible {
            display: block;
        }

        .merkmal-avatar .plus {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #d4d4d8;
            font-weight: 700;
            z-index: 10;
        }

        .merkmal-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <div>
                <h1>FAMILIEN OUTFIT</h1>
                <p>Vorlage für Familien & Fraktionen</p>
            </div>

            <div class="header-fields">
                <div class="header-field">
                    <label>Familienname</label>
                    <input class="header-input" type="text" placeholder="Name eingeben">
                </div>

                <div class="header-field">
                    <label>Farbschema</label>
                    <input class="header-input" type="text" placeholder="Farben">
                </div>
            </div>
        </div>

        <div class="main-grid">

            <div class="left-section">

                <div class="looks-grid">

                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="handleUpload(this)">
                        <img>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 1 – FRONT / BACK</div>
                        </div>
                    </label>

                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="handleUpload(this)">
                        <img>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 2 – FRONT / BACK</div>
                        </div>
                    </label>

                    <label class="upload-box h-80">
                        <input type="file" accept="image/*" onchange="handleUpload(this)">
                        <img>
                        <div class="placeholder">
                            <div class="plus">+</div>
                            <div class="label">LOOK 3 – FRONT / BACK</div>
                        </div>
                    </label>

                </div>

                <div class="bottom-section">

                    <div class="card">
                        <h2>ALLGEMEINES</h2>

                        <div class="allgemeines-list">
                            <input class="text-input" type="text" placeholder="Pflichtteile definieren">
                            <input class="text-input" type="text" placeholder="Farbschema festlegen">
                            <input class="text-input" type="text" placeholder="Freie Kleidungswahl">
                            <textarea class="textarea-input" placeholder="Besondere Regeln"></textarea>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h2>DETAILBILDER / RÜCKENANSICHT</h2>

                        <div class="details-grid">

                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="handleUpload(this)">
                                <img>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 1</div>
                                </div>
                            </label>

                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="handleUpload(this)">
                                <img>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 2</div>
                                </div>
                            </label>

                            <label class="upload-box h-52">
                                <input type="file" accept="image/*" onchange="handleUpload(this)">
                                <img>
                                <div class="placeholder">
                                    <div class="plus">+</div>
                                    <div class="label">DETAIL 3</div>
                                </div>
                            </label>

                        </div>
                    </div>

                </div>

            </div>

            <div class="merkmale-card">

                <h2>MERKMALE</h2>

                <div class="merkmale-list">

                    <div class="merkmal-item">

                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="handleUpload(this)">
                            <img>
                            <div class="plus">+</div>
                        </div>

                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="MERKMAL 1">
                            <textarea class="textarea-input" placeholder="Beschreibung oder Besonderheit hier eintragen."></textarea>
                        </div>

                    </div>

                    <div class="merkmal-item">

                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="handleUpload(this)">
                            <img>
                            <div class="plus">+</div>
                        </div>

                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="MERKMAL 2">
                            <textarea class="textarea-input" placeholder="Beschreibung oder Besonderheit hier eintragen."></textarea>
                        </div>

                    </div>

                    <div class="merkmal-item">

                        <div class="merkmal-avatar">
                            <input type="file" accept="image/*" onchange="handleUpload(this)">
                            <img>
                            <div class="plus">+</div>
                        </div>

                        <div class="merkmal-info">
                            <input class="text-input" type="text" placeholder="MERKMAL 3">
                            <textarea class="textarea-input" placeholder="Beschreibung oder Besonderheit hier eintragen."></textarea>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <script>
        function handleUpload(input) {
            const file = input.files?.[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                const img = input.parentElement.querySelector('img');

                if (img) {
                    img.src = e.target.result;
                    img.classList.add('visible');
                }
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
